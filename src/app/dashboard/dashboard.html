<div class="dashboard-header">
    <h1>
        <fa-icon [icon]="faChartBar"></fa-icon>
        Dashboard
    </h1>
</div>
<div class="dashboard-container">
    <app-chart [chartTitle]="'Total per Category'" [chartType]="'bar'" [chartData]="chartDataTotalPerCategory"
        [legend]="true">
    </app-chart>
    <app-chart [chartTitle]="'Total per Month'" [chartType]="'line'" [chartData]="chartDataTotalPerMonth"
        [legend]="true">
    </app-chart>
    <app-chart [chartTitle]="'Bills per Month'" [chartType]="'line'" [chartData]="chartBillsPerMonth" [legend]="true">
    </app-chart>
    <app-chart [chartTitle]="'Bills per Category'" [chartType]="'bar'" [chartData]="chartBillsPerCategory"
        [legend]="true">
    </app-chart>
    <app-chart [chartTitle]="'Monthly Expenses by Category (Stacked)'" 
               [chartType]="'bar'" 
               [chartData]="chartDataStackedByMonth"
               [chartOptions]="stackedBarOptions"
               [legend]="true">
    </app-chart>
</div>
